<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <!-- Tailwind CSS를 CDN으로 불러오기 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <!-- 전체 컨테이너: 중앙 정렬 -->
    <div class="bg-white rounded-lg shadow-lg p-8 w-80">
        <!-- 제목 -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
            카운터 앱
        </h1>

        <!-- 카운트 숫자를 보여주는 부분 -->
        <div class="bg-blue-50 rounded-lg p-8 mb-8 text-center">
            <!-- 숫자를 표시하는 큰 텍스트 -->
            <p class="text-6xl font-bold text-blue-600" id="counter">0</p>
            <p class="text-gray-600 mt-2">현재 카운트</p>
        </div>

        <!-- 버튼들을 감싸는 컨테이너 -->
        <div class="flex flex-col gap-3">
            <!-- 증가 버튼 -->
            <button
                id="increaseBtn"
                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105"
            >
                + 1 증가
            </button>

            <!-- 감소 버튼 -->
            <button
                id="decreaseBtn"
                class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105"
            >
                - 1 감소
            </button>

            <!-- 리셋 버튼 -->
            <button
                id="resetBtn"
                class="bg-blue-300 hover:bg-blue-400 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105"
            >
                🔄 리셋
            </button>
        </div>
    </div>

    <script>
        // ===== 변수 선언 =====
        // 현재 카운트 값을 저장하는 변수 (처음에는 0)
        let count = 0;

        // HTML에서 각 요소를 선택해서 변수에 저장
        // id="counter"인 요소 → 숫자를 표시할 부분
        const counterDisplay = document.getElementById('counter');
        // id="increaseBtn"인 요소 → 증가 버튼
        const increaseBtn = document.getElementById('increaseBtn');
        // id="decreaseBtn"인 요소 → 감소 버튼
        const decreaseBtn = document.getElementById('decreaseBtn');
        // id="resetBtn"인 요소 → 리셋 버튼
        const resetBtn = document.getElementById('resetBtn');

        // ===== 함수 정의 =====
        // 화면에 현재 카운트를 업데이트하는 함수
        // 왜? 버튼을 누를 때마다 화면의 숫자를 변경해야 하니까요
        function updateDisplay() {
            // counterDisplay의 텍스트를 현재 count 값으로 변경
            counterDisplay.textContent = count;
        }

        // ===== 이벤트 리스너 추가 =====
        // "증가" 버튼을 클릭했을 때 실행되는 코드
        increaseBtn.addEventListener('click', function() {
            // count를 1 증가시킨다
            count++;
            // 화면에 새로운 숫자를 표시한다
            updateDisplay();
        });

        // "감소" 버튼을 클릭했을 때 실행되는 코드
        decreaseBtn.addEventListener('click', function() {
            // count를 1 감소시킨다
            count--;
            // 화면에 새로운 숫자를 표시한다
            updateDisplay();
        });

        // "리셋" 버튼을 클릭했을 때 실행되는 코드
        resetBtn.addEventListener('click', function() {
            // count를 0으로 다시 설정한다
            count = 0;
            // 화면에 0을 표시한다
            updateDisplay();
        });
    </script>
</body>
</html>
