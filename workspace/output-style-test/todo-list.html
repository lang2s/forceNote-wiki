<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록 앱</title>
    <!-- Tailwind CSS를 CDN으로 불러오기 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
    <!-- 전체 컨테이너: 최대 너비 600px, 중앙 정렬 -->
    <div class="max-w-2xl mx-auto">
        <!-- 제목 -->
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
            📋 할 일 목록
        </h1>

        <!-- 입력 섹션 (카드 스타일) -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">새로운 할 일 추가</h2>

            <!-- 입력창과 버튼을 가로로 배열 -->
            <div class="flex gap-2">
                <!-- 할 일 입력 필드 -->
                <input
                    type="text"
                    id="todoInput"
                    placeholder="할 일을 입력하세요..."
                    class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition"
                >

                <!-- 추가 버튼 -->
                <button
                    id="addBtn"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105"
                >
                    추가
                </button>
            </div>
        </div>

        <!-- 할 일 목록 섹션 (카드 스타일) -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">할 일 목록</h2>

            <!-- 할 일 항목들이 여기에 들어갈 영역 -->
            <ul id="todoList" class="space-y-2">
                <!-- 처음에는 비어있고, JavaScript로 항목이 추가됩니다 -->
            </ul>

            <!-- 할 일이 없을 때 보여주는 메시지 -->
            <div id="emptyMessage" class="text-center text-gray-400 py-8">
                <p class="text-lg">아직 할 일이 없어요! 📭</p>
                <p class="text-sm">위에서 새로운 할 일을 추가해보세요.</p>
            </div>
        </div>

        <!-- 완료된 항목 수 표시 -->
        <div class="mt-6 text-center text-gray-600">
            <p class="text-sm">완료된 할 일: <span id="completeCount" class="font-bold text-green-600">0</span> / 전체: <span id="totalCount" class="font-bold text-blue-600">0</span></p>
        </div>
    </div>

    <script>
        // ===== 변수 선언 =====
        // 모든 할 일을 저장하는 배열
        // 배열이란? 여러 항목을 순서대로 저장하는 상자라고 생각하면 돼요
        let todos = [];
        // 각 할 일에 고유한 번호를 매기기 위한 변수
        let nextId = 1;

        // HTML 요소들을 변수에 저장
        const todoInput = document.getElementById('todoInput');        // 입력 필드
        const addBtn = document.getElementById('addBtn');              // 추가 버튼
        const todoList = document.getElementById('todoList');          // 할 일 목록
        const emptyMessage = document.getElementById('emptyMessage');  // 빈 상태 메시지
        const completeCount = document.getElementById('completeCount'); // 완료 수
        const totalCount = document.getElementById('totalCount');      // 전체 수

        // ===== 함수 정의 =====

        // 1. 할 일 화면에 표시하는 함수
        function renderTodos() {
            // 먼저 목록을 비웁니다 (새로 그리기 위해)
            todoList.innerHTML = '';

            // todos 배열의 각 항목에 대해 반복 실행
            // for...of는 배열의 모든 항목을 하나씩 꺼내는 반복문입니다
            todos.forEach((todo) => {
                // 하나의 할 일 항목(li 요소)을 만듭니다
                const li = document.createElement('li');

                // CSS 클래스 추가 (카드처럼 보이게 스타일 적용)
                li.className = 'bg-gray-50 p-4 rounded-lg border-l-4 border-blue-500 flex items-center justify-between hover:bg-gray-100 transition';

                // 체크 상태에 따라 추가 스타일 적용
                // 체크되었다면 회색으로 표시
                if (todo.completed) {
                    li.className += ' opacity-60 bg-gray-200';
                }

                // 할 일 항목의 내용을 HTML로 만듭니다
                li.innerHTML = `
                    <!-- 왼쪽: 체크박스와 텍스트 -->
                    <div class="flex items-center gap-3 flex-1">
                        <!-- 체크박스 -->
                        <input
                            type="checkbox"
                            class="w-5 h-5 text-blue-500 rounded cursor-pointer"
                            ${todo.completed ? 'checked' : ''}
                            onchange="toggleTodo(${todo.id})"
                        >

                        <!-- 할 일 텍스트 (체크되면 줄이 그어집니다) -->
                        <span class="text-gray-800 flex-1 ${todo.completed ? 'line-through text-gray-400' : ''}">
                            ${todo.text}
                        </span>
                    </div>

                    <!-- 오른쪽: 삭제 버튼 -->
                    <button
                        class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1 rounded transition"
                        onclick="deleteTodo(${todo.id})"
                    >
                        🗑️ 삭제
                    </button>
                `;

                // 만든 항목을 목록에 추가합니다
                todoList.appendChild(li);
            });

            // 할 일이 없으면 빈 메시지 표시, 있으면 숨김
            emptyMessage.style.display = todos.length === 0 ? 'block' : 'none';

            // 통계 업데이트
            updateStats();
        }

        // 2. 할 일 추가하는 함수
        function addTodo() {
            // 입력 필드의 값을 가져옵니다
            const text = todoInput.value.trim(); // trim()은 앞뒤 공백을 제거합니다

            // 입력값이 비어있으면 함수를 중단합니다
            // 빈 할 일은 추가하지 않으려고요
            if (text === '') {
                alert('할 일을 입력해주세요!');
                return;
            }

            // 새로운 할 일 객체를 만듭니다
            // 객체란? 여러 정보를 한 곳에 담는 상자라고 생각하면 돼요
            const newTodo = {
                id: nextId,           // 고유 번호
                text: text,           // 할 일 내용
                completed: false      // 완료 여부 (처음에는 false = 미완료)
            };

            // 배열에 새 항목을 추가합니다
            todos.push(newTodo);
            // 다음 할 일의 번호를 1 증가시킵니다
            nextId++;

            // 입력 필드를 비웁니다 (다음 입력을 위해)
            todoInput.value = '';
            // 입력 필드에 포커스를 맞춥니다 (바로 다음 입력을 할 수 있도록)
            todoInput.focus();

            // 화면을 다시 그립니다
            renderTodos();
        }

        // 3. 할 일 완료 여부를 토글하는 함수
        // toggle이란? 켜고 끄는 것처럼 상태를 바꾼다는 뜻입니다
        function toggleTodo(id) {
            // todos 배열에서 해당 id를 가진 할 일을 찾습니다
            const todo = todos.find((t) => t.id === id);

            // 찾았다면 completed 값을 반대로 바꿉니다
            // true → false, false → true
            if (todo) {
                todo.completed = !todo.completed;
            }

            // 화면을 다시 그립니다
            renderTodos();
        }

        // 4. 할 일 삭제하는 함수
        function deleteTodo(id) {
            // 배열에서 해당 id가 아닌 항목들만 남깁니다
            // filter는 조건에 맞는 항목들만 모아주는 함수입니다
            todos = todos.filter((todo) => todo.id !== id);

            // 화면을 다시 그립니다
            renderTodos();
        }

        // 5. 통계 업데이트하는 함수
        function updateStats() {
            // 완료된 할 일의 수를 세기
            const completed = todos.filter((todo) => todo.completed).length;

            // 화면에 표시
            completeCount.textContent = completed;
            totalCount.textContent = todos.length;
        }

        // ===== 이벤트 리스너 추가 =====

        // "추가" 버튼 클릭 시
        addBtn.addEventListener('click', addTodo);

        // 입력 필드에서 Enter 키 입력 시도 추가 버튼 클릭과 같이 작동
        // 이렇게 하면 마우스로 버튼을 클릭하지 않아도 Enter로 추가할 수 있어요
        todoInput.addEventListener('keypress', function(event) {
            // event.key === 'Enter'는 Enter 키를 눌렀는지 확인하는 것입니다
            if (event.key === 'Enter') {
                addTodo();
            }
        });

        // 초기 화면 설정
        renderTodos();
    </script>
</body>
</html>
